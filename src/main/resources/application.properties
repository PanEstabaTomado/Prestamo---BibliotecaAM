spring.application.name=prestamo
server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/prestamoam_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# URL de ms-especialidades. AppConfig la inyecta con @Value.
# Si el otro servicio cambia de host/puerto, solo cambiar aquí.
usuario.url=http://localhost:8089


